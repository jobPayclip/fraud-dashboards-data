name: Update data.js from Databricks

on:
  # schedule desactivado temporalmente — pendiente permisos
  # - cron: '0 14 * * *'  # 8am CST
  # - cron: '0 17 * * *'  # 11am CST
  # - cron: '0 20 * * *'  # 2pm CST
  workflow_dispatch:        # permite correrlo manualmente también

permissions:
  contents: write           # ← necesario para hacer push

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Descargar data.js desde Databricks Volume
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://clip-general-dev.cloud.databricks.com/api/2.0/fs/files/Volumes/main_dev/volumes/data_fraud_prevention/fraud-dashboards-data/mbr/data.js" \
            -o mbr/data.js
          echo "✅ Descargado — $(wc -c < mbr/data.js) bytes"

      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mbr/data.js
          git diff --staged --quiet && echo "⚠️ Sin cambios" || \
          git commit -m "chore: actualizar data.js — $(date +'%Y-%m-%d')" && git push
